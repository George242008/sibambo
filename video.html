<!DOCTYPE html>
<html lang="en"><a href="test.html">Click Hear</a> after watching the video
<body bgcolor="pink">
    <meta charset="UTF-8">
    <title>Delayed Play with Sound</title>
    <style>
        #overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: black;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 24px;
            cursor: pointer;
        }
    </style>
<body>

<div id="overlay">Click to start</div>

<video id="myVideo" width="1080" height="720">
    <source src="one.mp4" type="video/mp4">
</video>

<script>
const video = document.getElementById("myVideo");
const overlay = document.getElementById("overlay");

overlay.addEventListener("click", () => {
    overlay.style.display = "none";

    // Wait 3 seconds AFTER click
    setTimeout(() => {
        video.play();
    }, 3000);
});
</script>
</body>
</body>
</html>
